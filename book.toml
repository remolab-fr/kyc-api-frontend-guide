[book]
authors = ["Remolab"]
language = "en"
src = "src"
title = "KYC API Frontend Guide"
description = "A topic-based public course for frontend engineers building regulated onboarding, due diligence, and case review applications on top of the KYC API."

[output.html]
git-repository-url = "https://github.com/remolab-fr/kyc-api-frontend-guide"
site-url = "/kyc-api-frontend-guide/"
edit-url-template = "https://github.com/remolab-fr/kyc-api-frontend-guide/edit/main/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 0

[output.html.print]
enable = true
